name: Balance RL

on:
  pull_request:
    paths:
      - "data/balance.json"
      - "scripts/balance-rl-*.sh"
      - "sim/**"
      - "src/game/*catalog.ts"
      - "src/game/balance.ts"
      - "src/game/effect-dsl.ts"
      - ".github/workflows/balance-rl.yml"
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

jobs:
  quick-rl-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VOIDLINE_BALANCE_BACKEND: local
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install npm dependencies
        run: npm ci

      - name: Restore RL model cache
        uses: actions/cache@v4
        with:
          path: .context/rl-models
          key: voidline-rl-models-${{ runner.os }}-${{ hashFiles('data/balance.json', 'sim/Cargo.lock', 'sim/Cargo.toml', 'sim/crates/voidline-meta/src/learned_policy.rs', 'sim/crates/voidline-meta/src/obs.rs', 'sim/crates/voidline-py/src/lib.rs', 'sim/training/**/*.py', 'sim/training/configs/*.yaml') }}
          restore-keys: |
            voidline-rl-models-${{ runner.os }}-

      - name: Train cached baseline models on cache miss
        run: |
          missing=0
          for persona in learned-human learned-optimizer learned-explorer learned-novice; do
            if [ ! -s ".context/rl-models/${persona}.onnx" ]; then
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            VOIDLINE_RL_TIMESTEPS=64 npm run balance:rl:train:baseline
          fi

      - name: Run quick RL report
        run: npm run balance:rl:report:quick -- --output scripts/balance-rl-report.json

      - name: Upload RL report
        uses: actions/upload-artifact@v4
        with:
          name: balance-rl-report
          path: |
            scripts/balance-rl-report.json
            scripts/balance-rl-report.raw.json

  nightly-rl-report:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
      VOIDLINE_BALANCE_BACKEND: modal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - run: npm ci
      - name: Run Modal nightly balance suite
        run: |
          if [ -z "${MODAL_TOKEN_ID:-}" ] || [ -z "${MODAL_TOKEN_SECRET:-}" ]; then
            echo "Modal credentials are not configured; skipping remote nightly balance suite."
            exit 0
          fi
          npm run balance:modal:rl:train -- --timesteps 2048
          npm run balance:modal:profile:check
          npm run balance:rl:report
          npm run balance:modal:pull -- --models
          npm run balance:modal:pull -- --reports
      - uses: actions/upload-artifact@v4
        with:
          name: balance-rl-nightly
          path: |
            .context/rl-models/*.onnx
            .context/rl-models/*.json
            .context/balance-reports/**
            scripts/balance-rl-report.json
            scripts/balance-rl-report.raw.json
