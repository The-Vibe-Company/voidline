[workspace]
resolver = "2"
members = [
    "crates/voidline-data",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Voidline contributors"]
license = "MIT"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[profile.release]
lto = "thin"
codegen-units = 1
